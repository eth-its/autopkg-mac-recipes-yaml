Description: Downloads the latest Fantastical package.
Identifier: com.github.eth-its-recipes.pkg.Fantastical
MinimumVersion: "2.3"

Input:
  NAME: Fantastical
  SPARKLE_FEED_URL: "https://flexibits.com/fantastical/appcast2.php"

Process:

  - Processor: SparkleUpdateInfoProvider
    Arguments:
      appcast_url: "%SPARKLE_FEED_URL%"

  - Processor: URLDownloader

  - Processor: EndOfCheckPhase

  - Processor: Unarchiver
    Arguments:
      purge_destination: true
      destination_path: "%RECIPE_CACHE_DIR%/%NAME%"
      archive_path: "%pathname%"

  - Processor: CodeSignatureVerifier
    Arguments:
      requirement: anchor apple generic and identifier "com.flexibits.fantastical2.mac" and (certificate leaf[field.1.2.840.113635.100.6.1.9] /* exists */ or certificate 1[field.1.2.840.113635.100.6.2.6] /* exists */ and certificate leaf[field.1.2.840.113635.100.6.1.13] /* exists */ and certificate leaf[subject.OU] = "85C27NK92C")
      input_path: "%RECIPE_CACHE_DIR%/%NAME%/Fantastical.app"
