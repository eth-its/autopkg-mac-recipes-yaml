Description: Checks github for new relases of KopiaUI for arm64
Identifier: com.github.eth-its-recipes.download.KopiaUI-arm64
MinimumVersion: "2.3"

Input:
  INCLUDE_PRERELEASES: "False"

Process:
  - Processor: GitHubReleasesInfoProvider
    Arguments:
      github_repo: kopia/kopia
      include_prereleases: "%INCLUDE_PRERELEASES%"
      latest_only: "True"
      asset_regex: '^KopiaUI-.*?-arm64.dmg$'

  - Processor: URLDownloader

  - Processor: EndOfCheckPhase
