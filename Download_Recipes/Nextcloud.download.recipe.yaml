Description: Downloads the latest version of Nextcloud Desktop Client.
Identifier: com.github.eth-its-recipes.download.Nextcloud
MinimumVersion: 1.0.0

Input:
  NAME: Nextcloud
  GITHUB_REPO: nextcloud-releases/desktop

Process:
  - Processor: GitHubReleasesInfoProvider
    Arguments:
      github_repo: "%GITHUB_REPO%"
      asset_regex: ^Nextcloud-[0-9][0-9]\..*pkg$
      include_prereleases: ''

  - Processor: URLDownloader

  - Processor: EndOfCheckPhase

  - Processor: CodeSignatureVerifier
    Arguments:
      expected_authority_names:
        - "Developer ID Installer: Nextcloud GmbH (NKUJUXUJ3B)"
        - Developer ID Certification Authority
        - Apple Root CA
      input_path: "%pathname%"
