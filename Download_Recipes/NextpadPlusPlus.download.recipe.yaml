Description: Checks github for new relases of NextpadPlusPlus
Identifier: com.github.eth-its-recipes.download.NextpadPlusPlus
MinimumVersion: "2.3"

Input:
  INCLUDE_PRERELEASES: "False"

Process:
  - Processor: GitHubReleasesInfoProvider
    Arguments:
      github_repo: nextpad-plus-plus/nextpad-plus-plus-macos
      include_prereleases: "%INCLUDE_PRERELEASES%"

  - Processor: URLDownloader

  - Processor: EndOfCheckPhase
