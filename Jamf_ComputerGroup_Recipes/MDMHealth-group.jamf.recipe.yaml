Description: Creates an EA and a smart group concerned with monitoring a Mac client MDM health.
Identifier: com.github.eth-its-recipes.jamf.script.MDMHealth-EA
MinimumVersion: "2.3"

Input:
  EXTENSION_ATTRIBUTE_NAME: MDM Health
  EXTENSION_ATTRIBUTE_SCRIPT: MDMHealth-EA.zsh

Process:
  - Processor: com.github.grahampugh.jamf-upload.processors/JamfExtensionAttributeUploader
    Arguments:
      ea_script_path: "%EXTENSION_ATTRIBUTE_SCRIPT%"
      ea_name: "%EXTENSION_ATTRIBUTE_NAME%"
      replace_ea: "True"

  - Processor: com.github.grahampugh.jamf-upload.processors/JamfComputerGroupUploader
    Arguments:
      GROUP_NAME: "mac.ethOS - Macs with intact Jamf Binary but nonfunctional MDM (please re-enroll)"
      EXTENSION_ATTRIBUTE_SEARCH_TYPE: matches regex
      EXTENSION_ATTRIBUTE_VALUE: '^((?!Healthy).)*$'
      computergroup_template: SmartGroup-generic-EA-not-empty.xml
      computergroup_name: "%GROUP_NAME%"
      replace_group: "True"