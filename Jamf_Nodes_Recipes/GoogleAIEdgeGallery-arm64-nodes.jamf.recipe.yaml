  SELFSERVICE_DESCRIPTION: |
    Google Edge AI Gallery makes it easy to explore and experiment with on-device models on your mobile and laptop devices. 

    Please make sure to read the [ETH AI Guidelines](https://ethz.ch/staffnet/en/news-and-events/internal-news/archive/2025/09/new-guidelines-for-the-safe-use-of-ai-at-eth-zurich.html).
    Tools that use locally run models often still allow to pipe into cloud-models too.

    Version: %version%
    Category: %PKG_CATEGORY%