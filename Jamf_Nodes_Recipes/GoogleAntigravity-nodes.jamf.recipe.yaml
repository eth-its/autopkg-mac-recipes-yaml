ParentRecipe: com.github.eth-its-recipes.jamf.template-platform-nodes
MinimumVersion: "2.3"

Input:
  NAME: Google Antigravity
  JSS_INVENTORY_NAME: "Antigravity.app"
  PLATFORM: arm64
