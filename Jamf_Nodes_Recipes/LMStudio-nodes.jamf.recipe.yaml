Description: Creates a Self-Service Policy available to members of a Testing group.
Identifier: com.github.eth-its-recipes.jamf.LMStudio-nodes
ParentRecipe: com.github.eth-its-recipes.jamf.template-platform-EA-nodes
MinimumVersion: "2.3"

Input:
  NAME: LM Studio
  PLATFORM: arm64
  PLATFORM_EXCLUSION: x86_64
  PLATFORM_EXCLUSION_GROUP_NAME: "Intel Mac"
  UNTESTED_RECIPE_IDENTIFIER: local.jamf.LMStudio
  EXTENSION_ATTRIBUTE_NAME: LMStudioVersion
  EXTENSION_ATTRIBUTE_SCRIPT: LMStudio-EA.zsh
  TEST_VERSION_INSTALLED_GROUP_NAME: "%NAME% %PLATFORM% test version installed"
  TEST_VERSION_INSTALLED_GROUP_TEMPLATE: SmartGroup-test-version-installed-app-EA-platform.xml