Description: Creates all production policies for a particular title.
Identifier: com.github.eth-its-recipes.jamf.GoogleGemini-prod
MinimumVersion: "2.3"
ParentRecipe: com.github.eth-its-recipes.jamf.template-preset-platform-prod

Input:
  NAME: Google Gemini
  PLATFORM: arm64
  PLATFORM_EXCLUSION: x86_64
  PLATFORM_EXCLUSION_GROUP_NAME: "Intel Mac"
  UNTESTED_RECIPE_IDENTIFIER: local.jamf.GoogleGemini
  JSS_INVENTORY_NAME: "Gemini.app"
  PROD_VERSION_INSTALLED_GROUP_TEMPLATE: SmartGroup-prod-version-installed-platform-no-users.xml
  INSTALLED_GROUP_TEMPLATE: SmartGroup-installed-platform-no-users.xml
  SELFSERVICE_POLICY_TEMPLATE: Policy-prod-selfservice-install-platform-forcedescription.xml
  TRIGGER_POLICY_RUN_COMMAND: "chown -R root:staff /Applications/Gemini.app; chmod -R 755 /Applications/Gemini.app ; echo 'Installation of %NAME% %PLATFORM% complete'"

