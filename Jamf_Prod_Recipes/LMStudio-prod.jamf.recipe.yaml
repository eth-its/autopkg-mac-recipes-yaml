Description: Creates all production policies for a particular title.
Identifier: com.github.eth-its-recipes.jamf.LMStudio-prod
MinimumVersion: "2.3"
ParentRecipe: com.github.eth-its-recipes.jamf.template-preset-platform-prod-no-users

Input:
  NAME: LM Studio
  PLATFORM: arm64
  PLATFORM_EXCLUSION: x86_64
  PLATFORM_EXCLUSION_GROUP_NAME: "Intel Mac"
  UNTESTED_RECIPE_IDENTIFIER: local.jamf.LMStudio
  PROD_VERSION_INSTALLED_GROUP_TEMPLATE: SmartGroup-prod-version-installed-EA-no-users-platform.xml
  SELFSERVICE_POLICY_TEMPLATE: Policy-prod-selfservice-install-all-computers-forcedescription.xml
  EXTENSION_ATTRIBUTE_NAME: LMStudioVersion
  EXTENSION_ATTRIBUTE_SCRIPT: LMStudio-EA.zsh
  EXTENSION_ATTRIBUTE_VALUE: ^None$|^$ 