Description: Creates all production policies for Wolfram Mathematica; 1 trigger policy for installation, 2 trigger policies for node and floating licenses, 2 auto-install groups&policies, 2 selfservice policies. Requires NODE_LICENSE_STRING and FLOATING_LICENSE_SERVER overrides
Identifier: com.github.eth-its-recipes.jamf.WolframMathematica-prod
MinimumVersion: "2.3"

Input:
  NAME: "Wolfram Mathematica"
  JSS_INVENTORY_NAME: "Wolfram.app"
  UNTESTED_RECIPE_IDENTIFIER: local.jamf.WolframMathematica

  PARAMETER4_VALUE: "%FLOATING_LICENSE_SERVER%"
  PARAMETER5_VALUE: "%NODE_LICENSE_STRING%"
  PARAMETER6_VALUE: ""
  PARAMETER7_VALUE: ""
  PARAMETER8_VALUE: ""
  PARAMETER9_VALUE: ""
  PARAMETER10_VALUE: ""
  PARAMETER11_VALUE: ""

  EXTENSION_ATTRIBUTE_SCRIPT: "WolframMathematicaLicenseType-EA.zsh"
  EXTENSION_ATTRIBUTE_NAME: "Wolfram Mathematica License Type"

  PROD_VERSION_INSTALLED_GROUP_NAME: "%NAME% current version installed"
  PROD_VERSION_INSTALLED_GROUP_TEMPLATE: SmartGroup-prod-version-installed-no-users.xml
  TEST_VERSION_INSTALLED_GROUP_NAME: "%NAME% test version installed"
  INSTALLED_GROUP_NAME: "%NAME% installed"
  INSTALLED_GROUP_TEMPLATE: SmartGroup-installed-no-users.xml

  TRIGGER_NODE_POLICY_NAME: "Install %NAME% Node"
  TRIGGER_NODE_NAME: "%NAME%-node-install"
  TRIGGER_NODE_SCRIPT_NAME: "WolframMathematicaLicense-node-install.zsh"
  TRIGGER_NODE_POLICY_RUN_COMMAND: "echo 'Installation of %NAME% Node complete'"

  TRIGGER_FLOATING_POLICY_NAME: "Install %NAME% Floating"
  TRIGGER_FLOATING_NAME: "%NAME%-floating-install"
  TRIGGER_FLOATING_SCRIPT_NAME: "WolframMathematicaLicense-floating-install.zsh"
  TRIGGER_FLOATING_POLICY_RUN_COMMAND: "echo 'Installation of %NAME% Floating complete'"

  TRIGGER_SCRIPT_POLICY_TEMPLATE: Policy-script-triggeronly-parameters-nonotification.xml
  SCRIPT_PRIORITY: "Before"

  TRIGGER_POLICY_NAME: "Install %NAME%"
  TRIGGER_NAME: "%NAME%-install"
  PAYLOAD_TRIGGER_NAME: "%NAME%-install"
  TRIGGER_POLICY_RUN_COMMAND: "echo 'Installation of %NAME% complete'"
  TRIGGER_POLICY_TEMPLATE: Policy-prod-triggeronly.xml
  TRIGGER_POLICY_CATEGORY: Triggered Installers
  TRIGGER_POLICY_RUN_COMMAND: "jamf policy -event Mathematica-uninstall"

  AUTOINSTALL_NODE_GROUP_NAME: "%NAME% Node auto-install" #
  AUTOINSTALL_FLOATING_GROUP_NAME: "%NAME% Floating auto-install" #
  AUTOINSTALL_NODE_POLICY_NAME: "Auto-install %NAME% Node" 
  AUTOINSTALL_FLOATING_POLICY_NAME: "Auto-install %NAME% Floating"
  AUTOINSTALL_GROUP_TEMPLATE: SmartGroup-autoinstall-no-users-ITShop.xml
  AUTOINSTALL_POLICY_TEMPLATE: Policy-prod-autoinstall-ITShop.xml
  AUTOINSTALL_POLICY_CATEGORY: Auto-installers
  AUTOINSTALL_POLICY_FREQUENCY: Once every day

  AUTOUPDATE_GROUP_NAME: "%NAME% auto-update"
  AUTOUPDATE_GROUP_TEMPLATE: SmartGroup-autoupdate.xml
  AUTOUPDATE_ALL_SOFTWARE_GROUP_NAME: Software Gets Auto-updated
  AUTOUPDATE_ALL_SOFTWARE_GROUP_TEMPLATE: SmartGroup-autoupdate-all-software.xml
  AUTOUPDATE_POLICY_NAME: "Auto-update %NAME%"
  AUTOUPDATE_POLICY_CATEGORY: Auto-updaters
  AUTOUPDATE_POLICY_FREQUENCY: Once every day
  AUTOUPDATE_POLICY_TEMPLATE: Policy-prod-autoupdate.xml

  UPDATE_POLICY_NAME: "Update %NAME%"
  UPDATE_POLICY_TEMPLATE: Policy-prod-selfservice-update.xml
  UPDATE_POLICY_CATEGORY: Updates
  UPDATE_BUTTON_TEXT: "Update to %version%"
  UPDATE_SELFSERVICE_DISPLAY_NAME: "Update %NAME%"
  UPDATE_SELFSERVICE_DESCRIPTION: "%NAME% will be updated to version %version%."


  POLICY_NODE_NAME: "%NAME% Node"
  SELFSERVICE_NODE_DESCRIPTION: |
    Wolfram Mathematica by Wolfram Research is high-powered computation software with thousands of Wolfram Language functions, natural language input, real-world data, and mobile support.

    The node license does not require an active network connection to ETH.

    Version: %version%
    Category: %PKG_CATEGORY%

  SELFSERVICE_NODE_DISPLAY_NAME: "%NAME% Node"
  INSTALL_NODE_BUTTON_TEXT: "Install %version% Node"
  REINSTALL_NODE_BUTTON_TEXT: "Install %version% Node"
  POLICY_NODE_RUN_COMMAND: "echo 'Installation of %POLICY_NODE_NAME% complete'"
  POLICY_NODE_SCRIPT_NAME: "WolframMathematicaLicense-node-install.zsh"
 
  POLICY_FLOATING_NAME: "%NAME% Floating"
  SELFSERVICE_FLOATING_DESCRIPTION: |
    Wolfram Mathematica by Wolfram Research is high-powered computation software with thousands of Wolfram Language functions, natural language input, real-world data, and mobile support.

    The Floating license requires an active network connection to ETH (with VPN if offsite).

    Version: %version%
    Category: %PKG_CATEGORY%
  
  SELFSERVICE_FLOATING_DISPLAY_NAME: "%NAME% Floating"
  INSTALL_FLOATING_BUTTON_TEXT: "Install %version% Floating"
  REINSTALL_FLOATING_BUTTON_TEXT: "Install %version% Floating"
  POLICY_FLOATING_RUN_COMMAND: "echo 'Installation of %POLICY_FLOATING_NAME% complete'"
  POLICY_FLOATING_SCRIPT_NAME: "WolframMathematicaLicense-floating-install.zsh"

  SELFSERVICE_ICON: "%NAME%.png"
  SELFSERVICE_POLICY_TEMPLATE: Policy-prod-selfservice-install-ITShop.xml
  SELFSERVICE_POLICY_CATEGORY: "Science & Math"

  PROD_PREDICATE: "ready_to_stage == False"

    # Keys for reporting only
  SELFSERVICE_POLICY_NAME: "Wolfram Mathematica"
  PKG_CATEGORY: "%SELFSERVICE_POLICY_CATEGORY%"

  # ITShop integration - param4,5,and templates below due to custom recipe
  FORCE_DESCRIPTION: "false"
  ISG_GROUP_NAME: "%NAME% ISG-licensed"
  SCRIPT_NAME_ITSHOP: "ITShop_license_check.sh"
  SCRIPT_PRIORITY_ITSHOP: "After"
  #PARAMETER4_VALUE_ITSHOP: "Mathematica Node"
  #PARAMETER5_VALUE_ITSHOP: "%NAME%-install"
  PARAMETER6_VALUE_ITSHOP: "https://ics.services.jamfcloud.com/icon/hash_8af050314f4aa53e97e98f33a04c3e31b3ac2027e66c90547e26d5ba8f285217" 
  PARAMETER7_VALUE_ITSHOP: "NONE" 

  PROD_VERSION_FLOATING_INSTALLED_GROUP_NAME: "%NAME% floating version installed"
  PROD_VERSION_FLOATING_INSTALLED_GROUP_TEMPLATE: SmartGroup-prod-version-installed-EA.xml
  TEST_VERSION_FLOATING_INSTALLED_GROUP_NAME: "%NAME% floating test version installed"

  PROD_VERSION_NODE_INSTALLED_GROUP_NAME: "%NAME% node version installed"
  PROD_VERSION_NODE_INSTALLED_GROUP_TEMPLATE: SmartGroup-prod-version-installed-EA.xml
  TEST_VERSION_NODE_INSTALLED_GROUP_NAME: "%NAME% node test version installed"

Process:
  - Processor: com.github.grahampugh.recipes.preprocessors/LastRecipeRunChecker
    Arguments:
      recipeoverride_identifier: "%UNTESTED_RECIPE_IDENTIFIER%"

  - Processor: com.github.eth-its-recipes.processors/JamfUploadSharepointStageCheck

  - Processor: StopProcessingIf
    Arguments:
      predicate: "%PROD_PREDICATE%"

  - Processor: com.github.grahampugh.recipes.commonprocessors/VersionRegexGenerator

  - Processor: com.github.grahampugh.jamf-upload.processors/JamfCategoryUploader
    Arguments:
      category_name: "%TRIGGER_POLICY_CATEGORY%"

  - Processor: com.github.grahampugh.jamf-upload.processors/JamfCategoryUploader
    Arguments:
      category_name: "%UPDATE_POLICY_CATEGORY%"

  - Processor: com.github.grahampugh.jamf-upload.processors/JamfCategoryUploader
    Arguments:
      category_name: "%AUTOUPDATE_POLICY_CATEGORY%"

  - Processor: com.github.grahampugh.jamf-upload.processors/JamfCategoryUploader
    Arguments:
      category_name: "%AUTOINSTALL_POLICY_CATEGORY%"

  - Processor: com.github.grahampugh.jamf-upload.processors/JamfExtensionAttributeUploader
    Arguments:
      ea_script_path: "%EXTENSION_ATTRIBUTE_SCRIPT%"
      ea_name: "%EXTENSION_ATTRIBUTE_NAME%"
      replace_ea: "True"

  - Processor: com.github.grahampugh.jamf-upload.processors/JamfComputerGroupUploader
    Arguments:
      computergroup_name: "%INSTALLED_GROUP_NAME%"
      computergroup_template: "%INSTALLED_GROUP_TEMPLATE%"
      replace_group: "True"

  - Processor: com.github.grahampugh.jamf-upload.processors/JamfComputerGroupUploader
    Arguments:
      AUTOINSTALL_GROUP_NAME:  "%AUTOINSTALL_NODE_GROUP_NAME%"
      ISG_GROUP_NAME: "%NAME% Node ISG-licensed"
      computergroup_name: "%AUTOINSTALL_NODE_GROUP_NAME%"
      computergroup_template: "%AUTOINSTALL_GROUP_TEMPLATE%"
      replace_group: "False"

  - Processor: com.github.grahampugh.jamf-upload.processors/JamfComputerGroupUploader
    Arguments:
      AUTOINSTALL_GROUP_NAME:  "%AUTOINSTALL_FLOATING_GROUP_NAME%"
      ISG_GROUP_NAME: "%NAME% Floating ISG-licensed"
      computergroup_name: "%AUTOINSTALL_FLOATING_GROUP_NAME%"
      computergroup_template: "%AUTOINSTALL_GROUP_TEMPLATE%"
      replace_group: "False"

  - Processor: com.github.grahampugh.jamf-upload.processors/JamfComputerGroupUploader
    Arguments:
      computergroup_name: "%AUTOUPDATE_GROUP_NAME%"
      computergroup_template: "%AUTOUPDATE_GROUP_TEMPLATE%"
      replace_group: "False"

  - Processor: com.github.grahampugh.jamf-upload.processors/JamfComputerGroupUploader
    Arguments:
      computergroup_name: "%PROD_VERSION_INSTALLED_GROUP_NAME%"
      computergroup_template: "%PROD_VERSION_INSTALLED_GROUP_TEMPLATE%"
      replace_group: "True"

  - Processor: com.github.grahampugh.jamf-upload.processors/JamfComputerGroupUploader
    Arguments:
      computergroup_name: "%PROD_VERSION_FLOATING_INSTALLED_GROUP_NAME%"
      computergroup_template: "%PROD_VERSION_FLOATING_INSTALLED_GROUP_TEMPLATE%"
      replace_group: "True"
  
  - Processor: com.github.grahampugh.jamf-upload.processors/JamfComputerGroupUploader
    Arguments:
      computergroup_name: "%PROD_VERSION_NODE_INSTALLED_GROUP_NAME%"
      computergroup_template: "%PROD_VERSION_NODE_INSTALLED_GROUP_TEMPLATE%"
      replace_group: "True"

  - Processor: com.github.grahampugh.jamf-upload.processors/JamfPolicyUploader
    Comment: Trigger-only policy for app installation
    Arguments:
      policy_template: "%TRIGGER_POLICY_TEMPLATE%"
      policy_name: "%TRIGGER_POLICY_NAME%"
      icon: ""
      replace_policy: "True"

  - Processor: com.github.grahampugh.jamf-upload.processors/JamfPolicyUploader
    Comment: Trigger-only policy for node licensing
    Arguments:
      TRIGGER_POLICY_NAME: "%TRIGGER_NODE_POLICY_NAME%"
      TRIGGER_NAME: "%TRIGGER_NODE_NAME%"
      SCRIPT_NAME: "%TRIGGER_NODE_SCRIPT_NAME%"
      policy_template: "%TRIGGER_SCRIPT_POLICY_TEMPLATE%"
      policy_name: "%TRIGGER_NODE_POLICY_NAME%"
      icon: ""
      replace_policy: "True"

  - Processor: com.github.grahampugh.jamf-upload.processors/JamfPolicyUploader
    Comment: Trigger-only policy for floating licensing
    Arguments:
      TRIGGER_POLICY_NAME: "%TRIGGER_FLOATING_POLICY_NAME%"
      TRIGGER_NAME: "%TRIGGER_FLOATING_NAME%"
      SCRIPT_NAME: "%TRIGGER_FLOATING_SCRIPT_NAME%"
      policy_template: "%TRIGGER_SCRIPT_POLICY_TEMPLATE%"
      policy_name: "%TRIGGER_FLOATING_POLICY_NAME%"
      icon: ""
      replace_policy: "True"

  - Processor: com.github.grahampugh.jamf-upload.processors/JamfPolicyUploader
    Comment: Auto-install policy for node license
    Arguments:
      AUTOINSTALL_POLICY_NAME: "%AUTOINSTALL_NODE_POLICY_NAME%"
      TRIGGER_NAME: "%TRIGGER_NODE_NAME%"
      AUTOINSTALL_GROUP_NAME: "%AUTOINSTALL_NODE_GROUP_NAME%"
      PARAMETER4_VALUE_ITSHOP: "Mathematica Node"
      PARAMETER5_VALUE_ITSHOP: "%TRIGGER_NODE_NAME%"
      policy_template: "%AUTOINSTALL_POLICY_TEMPLATE%"
      policy_name: "%AUTOINSTALL_NODE_POLICY_NAME%"
      icon: ""
      replace_policy: "True"

  - Processor: com.github.grahampugh.jamf-upload.processors/JamfPolicyUploader
    Comment: Auto-install policy for floating license
    Arguments:
      AUTOINSTALL_POLICY_NAME: "%AUTOINSTALL_FLOATING_POLICY_NAME%"
      TRIGGER_NAME: "%TRIGGER_FLOATING_NAME%"
      AUTOINSTALL_GROUP_NAME: "%AUTOINSTALL_FLOATING_GROUP_NAME%"
      PARAMETER4_VALUE_ITSHOP: "Mathematica Floating"
      PARAMETER5_VALUE_ITSHOP: "%TRIGGER_FLOATING_NAME%"
      policy_template: "%AUTOINSTALL_POLICY_TEMPLATE%"
      policy_name: "%AUTOINSTALL_FLOATING_POLICY_NAME%"
      icon: ""
      replace_policy: "True"

  - Processor: com.github.grahampugh.jamf-upload.processors/JamfPolicyUploader
    Comment: Auto-update policy
    Arguments:
      TRIGGER_NAME: "%PAYLOAD_TRIGGER_NAME%"
      policy_template: "%AUTOUPDATE_POLICY_TEMPLATE%"
      policy_name: "%AUTOUPDATE_POLICY_NAME%"
      icon: ""
      replace_policy: "True"

  - Processor: com.github.grahampugh.jamf-upload.processors/JamfPolicyUploader
    Comment: Self Service update policy
    Arguments:
      TRIGGER_NAME: "%PAYLOAD_TRIGGER_NAME%"
      policy_template: "%UPDATE_POLICY_TEMPLATE%"
      policy_name: "%UPDATE_POLICY_NAME%"
      icon: "%SELFSERVICE_ICON%"
      replace_policy: "True"

  - Processor: com.github.grahampugh.jamf-upload.processors/JamfPolicyUploader
    Comment: Self Service install policy for node license
    Arguments:
      TRIGGER_NAME: "%TRIGGER_NODE_NAME%"
      SELFSERVICE_POLICY_NAME: "%POLICY_NODE_NAME%"
      SELFSERVICE_DISPLAY_NAME: "%SELFSERVICE_NODE_DISPLAY_NAME%"
      SELFSERVICE_DESCRIPTION: "%SELFSERVICE_NODE_DESCRIPTION%"
      INSTALL_BUTTON_TEXT: "%INSTALL_NODE_BUTTON_TEXT%"
      PARAMETER4_VALUE_ITSHOP: "Mathematica Node"
      PARAMETER5_VALUE_ITSHOP: "%TRIGGER_NODE_NAME%"
      INSTALLED_GROUP_NAME: PROD_VERSION_NODE_INSTALLED_GROUP_NAME
      icon: "%SELFSERVICE_ICON%"
      replace_policy: "True"
      policy_template: "%SELFSERVICE_POLICY_TEMPLATE%"
      policy_name: "%POLICY_NODE_NAME%"

  - Processor: com.github.grahampugh.jamf-upload.processors/JamfPolicyUploader
    Comment: Self Service install policy for floating license
    Arguments:
      TRIGGER_NAME: "%TRIGGER_FLOATING_NAME%"
      SELFSERVICE_POLICY_NAME: "%POLICY_FLOATING_NAME%"
      SELFSERVICE_DISPLAY_NAME: "%SELFSERVICE_FLOATING_DISPLAY_NAME%"
      SELFSERVICE_DESCRIPTION: "%SELFSERVICE_FLOATING_DESCRIPTION%"
      INSTALL_BUTTON_TEXT: "%INSTALL_FLOATING_BUTTON_TEXT%"
      PARAMETER4_VALUE_ITSHOP: "Mathematica Floating"
      PARAMETER5_VALUE_ITSHOP: "%TRIGGER_FLOATING_NAME%"
      INSTALLED_GROUP_NAME: "%PROD_VERSION_FLOATING_INSTALLED_GROUP_NAME%"
      policy_template: "%SELFSERVICE_POLICY_TEMPLATE%"
      policy_name: "%POLICY_FLOATING_NAME%"
      icon: "%SELFSERVICE_ICON%"
      replace_policy: "True"

  - Processor: com.github.grahampugh.jamf-upload.processors/JamfPolicyDeleter
    Comment: Delete the untested node policy
    Arguments:
      policy_name: "%NAME% Node (Testing)"

  - Processor: com.github.grahampugh.jamf-upload.processors/JamfPolicyDeleter
    Comment: Delete the untested floating policy
    Arguments:
      policy_name: "%NAME% Floating (Testing)"

  - Processor: com.github.grahampugh.jamf-upload.processors/JamfComputerGroupDeleter
    Comment: Delete the test version installed group
    Arguments:
      computergroup_name: "%TEST_VERSION_INSTALLED_GROUP_NAME%"
      SELFSERVICE_POLICY_NAME: "%NAME%" #to override things

  - Processor: com.github.grahampugh.jamf-upload.processors/JamfComputerGroupDeleter
    Comment: Delete the test version installed group
    Arguments:
      computergroup_name: "%TEST_VERSION_FLOATING_INSTALLED_GROUP_NAME%"
      SELFSERVICE_POLICY_NAME: "%NAME%" #to override things

  - Processor: com.github.grahampugh.jamf-upload.processors/JamfComputerGroupDeleter
    Comment: Delete the test version installed group
    Arguments:
      computergroup_name: "%TEST_VERSION_NODE_INSTALLED_GROUP_NAME%"
      SELFSERVICE_POLICY_NAME: "%NAME%" #to override things
