Description: Creates all production policies for a particular title.
Identifier: com.github.eth-its-recipes.jamf.pgAdmin4-x86_64-prod
MinimumVersion: "2.3"
ParentRecipe: com.github.eth-its-recipes.jamf.template-platform-prod-no-users

Input:
  NAME: pgAdmin 4
  UNTESTED_RECIPE_IDENTIFIER: local.jamf.pgAdmin4-x86_64
  PLATFORM: x86_64
  PROD_VERSION_INSTALLED_GROUP_TEMPLATE: SmartGroup-prod-version-installed-platform-no-users.xml
  TRIGGER_POLICY_TEMPLATE: Policy-prod-triggeronly.xml
  ARCH: "%PLATFORM%"
  PLATFORM_EXCLUSION_GROUP_NAME: "Apple Silicon Mac"
  PLATFORM_EXCLUSION: arm64
  PLATFORM_EXCLUSION_GROUP_TEMPLATE: SmartGroup-platform.xml
  SELFSERVICE_ICON: "pgAdmin4.png"