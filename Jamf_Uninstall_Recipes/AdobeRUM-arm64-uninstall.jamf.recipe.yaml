Description: Uploads a script to the Jamf Pro Server and creates a Self Service Policy and Smart Group.
Identifier: com.github.eth-its-recipes.jamf.AdobeRUM-arm64-uninstall
MinimumVersion: "2.3"
ParentRecipe: com.github.eth-its-recipes.jamf.template-script-uninstall-platform-no-users

Input:
  NAME: Adobe Remote Update Manager
  SCRIPT_NAME: AdobeRUM-uninstall.zsh
  SCRIPT_PATH: AdobeRUM-uninstall.zsh
  EXTENSION_ATTRIBUTE_NAME: Adobe RUM Version
  EXTENSION_ATTRIBUTE_SEARCH_TYPE: does not match regex
  EXTENSION_ATTRIBUTE_VALUE: "^None$|^$"
  INSTALLED_GROUP_NAME: "%NAME% %PLATFORM% installed"
  INSTALLED_GROUP_TEMPLATE: SmartGroup-installed-EA-platform-no-users.xml
  SELFSERVICE_ICON: Adobe Creative Cloud 5.3.png
  TRIGGER_UNINSTALL_POLICY_TEMPLATE: Policy-uninstall-triggeronly-script.xml
  AUTOINSTALL_GROUP_TEMPLATE: SmartGroup-autoinstall-no-users.xml
  PLATFORM: arm64
  PLATFORM_EXCLUSION_GROUP_TEMPLATE: SmartGroup-platform.xml
  PLATFORM_EXCLUSION: x86_64
  PLATFORM_EXCLUSION_GROUP_NAME: "Intel Mac"
  ARCH: AppleSilicon