Description: Downloads latest Chimera installer and uses it to create a package.
Identifier: com.github.eth-its-recipes.pkg.Bitwarden
MinimumVersion: 1.0.0
ParentRecipe: com.github.eth-its-recipes.download.Bitwarden

Input:
  NAME: Bitwarden
  VENDOR: Bitwarden

Process:
  - Processor: AppPkgCreator
    Arguments:
      pkg_path: "%RECIPE_CACHE_DIR%/%NAME%-%version%.pkg"
      app_path: "%pathname%/Bitwarden.app"