Description: Downloads latest Chimera installer and uses it to create a package.
Identifier: com.github.eth-its-recipes.pkg.CCP4
MinimumVersion: 1.0.0
ParentRecipe: com.github.eth-its-recipes.download.CCP4

Input:
  NAME: CCP4

Process:

  - Processor: PkgRootCreator
    Arguments:
      pkgdirs:
        Library: "0755"
        Library/Management: "0755"
        Library/Management/CCP4: "0755"
      pkgroot: "%RECIPE_CACHE_DIR%/pkgroot"

  - Processor: Copier
    Arguments:
      source_path: "%pathname%"
      destination_path: "%RECIPE_CACHE_DIR%/pkgroot/Library/Management/CCP4/"

  - Processor: PkgCreator
    Arguments:
      pkg_request:
        chown: []
        id: "ch.ethz.id.pkg.ccp4"
        pkgname: "%NAME%-%version%"
        pkgroot: "%RECIPE_CACHE_DIR%/pkgroot"
        pkgtype: flat
        version: "%version%"

  #- Processor: PathDeleter
  #  Arguments:
  #   path_list:
  #      - "%RECIPE_CACHE_DIR%/pkgroot"