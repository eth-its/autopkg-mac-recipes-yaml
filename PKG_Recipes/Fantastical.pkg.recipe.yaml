Description: Downloads the latest version of Fantastical and creates a package.
Identifier: com.github.eth-its-recipes.pkg.Fantastical
ParentRecipe: com.github.eth-its-recipes.download.Fantastical
MinimumVersion: 1.0.0

Input:
  NAME: Fantastical

Process:
  - Processor: AppPkgCreator
    Arguments:
      app_path: "%RECIPE_CACHE_DIR%/%NAME%/Fantastical.app"
