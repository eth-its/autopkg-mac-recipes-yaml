Description: Downloads the latest version of Prism and creates a package.
Identifier: com.github.eth-its-recipes.pkg.GoogleAIEdgeGallery-arm64
MinimumVersion: 1.0.0
ParentRecipe: com.github.eth-its-recipes.download.GoogleAIEdgeGallery-arm64

Input:
  NAME: GoogleAIEdgeGallery

Process:
  - Processor: AppPkgCreator
    Arguments:
      app_path: "%RECIPE_CACHE_DIR%/downloads/%NAME%-arm64-%version%.dmg/%NAME%.app"
      pkg_path: "%RECIPE_CACHE_DIR%/%NAME%-arm64-%version%.pkg"
      pkg_name: "%NAME%-arm64-%version%.pkg"