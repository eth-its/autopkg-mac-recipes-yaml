Description: Downloads the latest version of NotepadPlusPlus from Github and creates a package.
Identifier: com.github.eth-its-recipes.pkg.KopiaUI-arm64
MinimumVersion: "2.3"
ParentRecipe: com.github.eth-its-recipes.download.KopiaUI-arm64

Input:
  NAME: KopiaUI

Process:
  - Processor: AppPkgCreator
    Arguments:
      pkg_path: "%RECIPE_CACHE_DIR%/NotepadPlusPlus-%version%.pkg"
