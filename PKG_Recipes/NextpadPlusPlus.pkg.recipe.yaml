Description: Downloads the latest version of NotepadPlusPlus from Github and creates a package.
Identifier: com.github.eth-its-recipes.pkg.NextpadPlusPlus
MinimumVersion: "2.3"
ParentRecipe: com.github.eth-its-recipes.download.NextpadPlusPlus

Input:
  NAME: NextpadPlusPlus

Process:
  - Processor: AppPkgCreator
    Arguments:
      pkg_path: "%RECIPE_CACHE_DIR%/NextpadPlusPlus-%version%.pkg"
